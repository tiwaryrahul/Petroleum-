name: dbt Petroleum Pipeline

on:
  # Scheduled run - Daily at 6 AM UTC
  schedule:
    - cron: '0 6 * * *'

  # Manual trigger
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Run with --full-refresh'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  DBT_PROJECT_DIR: petroleum_pipeline

jobs:
  dbt-seed:
    name: dbt Seed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install dbt-snowflake==1.11.3

      - name: dbt deps
        run: cd $DBT_PROJECT_DIR && dbt deps --profiles-dir .

      - name: dbt seed
        run: cd $DBT_PROJECT_DIR && dbt seed --profiles-dir .

  dbt-bronze:
    name: Bronze Layer
    needs: dbt-seed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install dbt-snowflake==1.11.3

      - name: dbt snapshot
        run: cd $DBT_PROJECT_DIR && dbt snapshot --profiles-dir .

      - name: dbt run bronze
        run: |
          cd $DBT_PROJECT_DIR
          if [ "${{ github.event.inputs.full_refresh }}" = "true" ]; then
            dbt run --select models/bronze --full-refresh --profiles-dir .
          else
            dbt run --select models/bronze --profiles-dir .
          fi

      - name: dbt test bronze
        run: cd $DBT_PROJECT_DIR && dbt test --select models/bronze --profiles-dir .

  dbt-silver:
    name: Silver Layer
    needs: dbt-bronze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install dbt-snowflake==1.11.3

      - name: dbt run silver
        run: cd $DBT_PROJECT_DIR && dbt run --select models/silver --profiles-dir .

      - name: dbt test silver
        run: cd $DBT_PROJECT_DIR && dbt test --select models/silver --profiles-dir .

  dbt-gold:
    name: Gold Layer
    needs: dbt-silver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install dbt-snowflake==1.11.3

      - name: dbt run gold
        run: cd $DBT_PROJECT_DIR && dbt run --select models/gold --profiles-dir .

      - name: dbt test gold
        run: cd $DBT_PROJECT_DIR && dbt test --select models/gold --profiles-dir .

      - name: dbt docs generate
        run: cd $DBT_PROJECT_DIR && dbt docs generate --profiles-dir .
